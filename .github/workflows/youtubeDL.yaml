name: 🎬 Enhanced YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Video quality (best, 1440, 1080, 720, 480, 360, 240, lowest, audio)'
        required: false
        default: '480'
        type: string
      password:
        description: 'Password for 7z archives (optional)'
        required: false
        default: ''
        type: string
      use_cookies:
        description: 'Use cookies? (yes/no) - Strongly recommended'
        required: true
        default: 'yes'
        type: string

jobs:
  download-youtube:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Show Workflow Signature
        run: |
          echo "========================================"
          echo "🚀 YouTube Downloader Workflow Started"
          echo "Workflow by @TheyCallMeRubik"
          echo "========================================"

      - name: Start Cloudflare WARP proxy
        run: |
          docker network create warp-net 2>/dev/null || true
          docker run -d --name warp --restart=always --network warp-net \
            -p 1080:1080 --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          sleep 30

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip ffmpeg p7zip-full curl jq unzip
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          pip3 install --upgrade yt-dlp

      - name: Setup YouTube Cookies
        if: github.event.inputs.use_cookies == 'yes'
        run: |
          if [ -n "${{ secrets.YOUTUBE_COOKIES }}" ]; then
            echo "${{ secrets.YOUTUBE_COOKIES }}" | base64 -d > cookies.txt
            echo "✅ Cookies loaded ($(wc -c < cookies.txt) bytes)"
          else
            echo "❌ YOUTUBE_COOKIES secret is missing!" && exit 1
          fi

      - name: Download YouTube video
        run: |
          set -euo pipefail

          URL="${{ github.event.inputs.youtube_url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          SPLIT_MB=90
          SPLIT_BYTES=$((SPLIT_MB * 1024 * 1024))
          BACKUP_DIR="/tmp/video_backup_$$"

          mkdir -p "$BACKUP_DIR" videos tmp_downloads

          # Format selection...
          case "$QUALITY" in
            audio) FORMAT="bestaudio/best" ;;
            best) FORMAT="bestvideo+bestaudio/best" ;;
            1440) FORMAT="bestvideo[height<=1440]+bestaudio/best" ;;
            1080) FORMAT="bestvideo[height<=1080]+bestaudio/best" ;;
            720)  FORMAT="bestvideo[height<=720]+bestaudio/best" ;;
            480)  FORMAT="bestvideo[height<=480]+bestaudio/best" ;;
            360)  FORMAT="bestvideo[height<=360]+bestaudio/best" ;;
            240)  FORMAT="bestvideo[height<=240]+bestaudio/best" ;;
            lowest) FORMAT="worstvideo+worstaudio/worst" ;;
            *) FORMAT="bestvideo+bestaudio/best" ;;
          esac

          COMMON_FLAGS="--merge-output-format mp4 --output tmp_downloads/%(title)s.%(ext)s --no-part --no-playlist --retries 10 --fragment-retries 10"
          COOKIE_FLAG=$([ -f cookies.txt ] && echo "--cookies cookies.txt" || echo "")

          # Try multiple download methods
          METHODS=(
            "${COOKIE_FLAG} --extractor-args youtube:player_client=web,android,mweb,ios --concurrent-fragments 8"
            "${COOKIE_FLAG} --extractor-args youtube:player_client=android,web"
            "--proxy socks5://127.0.0.1:1080 ${COOKIE_FLAG} --extractor-args youtube:player_client=web,android"
          )

          for idx in "${!METHODS[@]}"; do
            echo "Trying download method $((idx+1))..."
            if yt-dlp --format "$FORMAT" $COMMON_FLAGS ${METHODS[$idx]} "$URL"; then
              echo "✅ Download successful!"
              break
            fi
            sleep 8
          done

          find tmp_downloads -name "*.part" -delete 2>/dev/null || true

          # ==================== PROCESS FILES ====================
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue

            SIZE=$(stat -c%s "$FILE")
            BASENAME=$(basename "$FILE")
            SAFE_NAME=$(echo "$BASENAME" | sed 's/[^a-zA-Z0-9._ -]/-/g' | sed 's/ /-/g' | sed 's/-+/-/g' | cut -c1-100)
            FOLDER_NAME="$SAFE_NAME"

            mkdir -p "$BACKUP_DIR/$FOLDER_NAME"

            # === ARCHIVE ===
            if [ "$SIZE" -gt "$SPLIT_BYTES" ]; then
              7z a -v${SPLIT_MB}m -p"${ZIP_PASSWORD}" -mhe=on -mx=0 "$BACKUP_DIR/${FOLDER_NAME}/${FOLDER_NAME}.7z" "$FILE"
            else
              if [ -n "$ZIP_PASSWORD" ]; then
                7z a -p"${ZIP_PASSWORD}" -mhe=on -mx=0 "$BACKUP_DIR/${FOLDER_NAME}/${FOLDER_NAME}.7z" "$FILE"
              else
                cp "$FILE" "$BACKUP_DIR/${FOLDER_NAME}/${FOLDER_NAME}.${BASENAME##*.}"
              fi
            fi

            # === CREATE README (Fixed - no bare --- at start of line) ===
            cat > "$BACKUP_DIR/${FOLDER_NAME}/README.md" << 'README_EOF'
# VIDEO TITLE

---
README_EOF

            cat >> "$BACKUP_DIR/${FOLDER_NAME}/README.md" << EOF
## Video Information

| Property              | Value |
|-----------------------|-------|
| Original Name         | \`${BASENAME}\` |
| Quality               | **${QUALITY}** |
| Size                  | $((SIZE / 1024 / 1024)) MB |
| Password Protected    | **$( [ -n "$ZIP_PASSWORD" ] && echo "YES" || echo "NO" )** |

---

**Please delete this folder after downloading** to keep the repository size under control.

---
*Generated by GitHub Actions • @TheyCallMeRubik*
EOF
          done

          rm -rf tmp_downloads

          # Commit & Push
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          cp -r "$BACKUP_DIR"/* videos/ 2>/dev/null || true

          # Update main index
          cat > videos/README.md << 'EOL'
# DOWNLOADED VIDEOS
---
EOL

          for folder in videos/*/; do
            [ -d "$folder" ] || continue
            name=$(basename "$folder")
            echo "- 🎬 [$name](./${name})" >> videos/README.md
          done

          git add -A videos/
          git commit -m "[YouTube] Add video [skip ci]" || echo "Nothing to commit"
          git push
