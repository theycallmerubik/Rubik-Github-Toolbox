name: ⬇️ Download from url

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of URLs to download'
        required: true
        type: string
      mode:
        description: 'Download mode'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      password:
        description: 'Password for 7z archives (optional)'
        required: false
        default: ''
        type: string

jobs:
  save-file:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          
      - name: Show Workflow Signature
        run: |
          echo "========================================"
          echo "⬇️  GitHub URL Downloader Started"
          echo ""
          echo "Workflow by @TheyCallMeRubik"
          echo "Built with ❤️ and hope for free iran"
          echo ""
          echo "========================================"

      - name: Configure Git
        run: |
          git config --global http.postBuffer 524288000
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y aria2 p7zip-full curl bc

      - name: Download files
        run: |
          set -euo pipefail

          MODE="${{ github.event.inputs.mode }}"
          URLS="${{ github.event.inputs.urls }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          SPLIT_MB=90
          SPLIT_BYTES=$(( SPLIT_MB * 1024 * 1024 ))

          BACKUP_DIR="/tmp/download_backup_$$"
          mkdir -p "$BACKUP_DIR" downloads tmp_downloads
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt

          echo "=== GitHub Repository Limits Warning ==="
          echo "• Hard limit: 100 MB per file"
          echo "• Files larger than ${SPLIT_MB}MB will be automatically split"
          echo "• Please keep total repo size under 5 GB"
          echo "=========================================="

          # ==================== HELPER FUNCTIONS ====================
          sanitize_name() {
            echo "$1" | sed 's/[^a-zA-Z0-9._ -]/-/g' | sed 's/ /-/g' | sed 's/-+/-/g' | sed 's/^-//;s/-$//' | cut -c1-100
          }

          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          download_with_retry() {
            local URL="$1"
            local FILENAME="$2"
            local MAX_RETRIES=3

            rm -f "tmp_downloads/$FILENAME"*

            for ((attempt=1; attempt<=MAX_RETRIES; attempt++)); do
              echo "Attempt $attempt/$MAX_RETRIES for $FILENAME"

              aria2c --split=8 --max-connection-per-server=4 --min-split-size=20M \
                --max-tries=5 --retry-wait=5 --timeout=60 --connect-timeout=30 \
                --check-certificate=false --allow-overwrite=true \
                --dir="tmp_downloads" --out="$FILENAME" "$URL" && break

              echo "aria2c failed, trying curl..."
              curl -L -f --retry 3 --retry-delay 5 --connect-timeout 30 \
                -A "Mozilla/5.0" -o "tmp_downloads/$FILENAME" "$URL" && break

              sleep $((attempt * 5))
            done

            if [ -f "tmp_downloads/$FILENAME" ] && [ -s "tmp_downloads/$FILENAME" ]; then
              echo "✅ Successfully downloaded: $FILENAME"
              return 0
            else
              echo "❌ Failed to download: $FILENAME"
              return 1
            fi
          }

          # ==================== DOWNLOAD FILES ====================
          for URL in $URLS; do
            ORIGINAL_NAME=$(basename "$URL" | sed 's/%20/ /g' | sed 's/[?#].*//')
            SAFE_NAME=$(sanitize_name "$ORIGINAL_NAME")
            echo "Downloading: $URL → $SAFE_NAME"
            download_with_retry "$URL" "$SAFE_NAME" || echo "Failed: $SAFE_NAME"
          done

          # ==================== PROCESS WITH 7z ====================
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            BASENAME=$(basename "$FILE")
            SAFE_BASENAME=$(sanitize_name "$BASENAME")

            FOLDER_NAME="$SAFE_BASENAME"
            COUNTER=1
            while [ -d "$BACKUP_DIR/$FOLDER_NAME" ]; do
              FOLDER_NAME="${SAFE_BASENAME}_$COUNTER"
              COUNTER=$((COUNTER + 1))
            done

            mkdir -p "\( BACKUP_DIR/ \){FOLDER_NAME}"
            FOLDER_ENCODED=\( (urlencode " \){FOLDER_NAME}")

            echo "Processing: \( BASENAME ( \)((SIZE / 1024 / 1024)) MB)"

            if [ "$SIZE" -gt "$SPLIT_BYTES" ]; then
              echo "→ Splitting into ${SPLIT_MB}MB parts using 7z"
              if [ -n "$ZIP_PASSWORD" ]; then
                7z a -v\( {SPLIT_MB}m -p" \){ZIP_PASSWORD}" -mhe=on -mx=0 "\( BACKUP_DIR/ \){FOLDER_NAME}/${FOLDER_NAME}.7z" "$FILE"
              else
                7z a -v${SPLIT_MB}m -mx=0 "\( BACKUP_DIR/ \){FOLDER_NAME}/${FOLDER_NAME}.7z" "$FILE"
              fi
            else
              if [ -n "$ZIP_PASSWORD" ]; then
                7z a -p"${ZIP_PASSWORD}" -mhe=on -mx=0 "\( BACKUP_DIR/ \){FOLDER_NAME}/${FOLDER_NAME}.7z" "$FILE"
              else
                cp "$FILE" "\( BACKUP_DIR/ \){FOLDER_NAME}/\( {FOLDER_NAME}. \){FILE##*.}"
              fi
            fi

            # ==================== CREATE README ====================
            README_FILE="\( BACKUP_DIR/ \){FOLDER_NAME}/README.md"
            {
              echo "# ${FOLDER_NAME}"
              echo ""
              echo "---"
              echo ""
              echo "## Download Information"
              echo ""
              echo "| Property | Value |"
              echo "|----------|-------|"
              echo "| **Original Name** | \`${BASENAME}\` |"
              echo "| **Size** | $((SIZE / 1024 / 1024)) MB |"
              echo "| **Status** | **Complete (100%)** |"
              if [ -n "$ZIP_PASSWORD" ]; then
                echo "| **Password Protected** | **YES** |"
              else
                echo "| **Password Protected** | **NO** |"
              fi
              echo ""
              echo "---"
              echo ""
              echo "## Important Note"
              echo ""
              echo "**Please clean up this folder after you finish downloading.**"
              echo "GitHub repositories have size limits. Removing old files helps keep this repository fast and healthy."
              echo ""
              echo "---"
              echo ""
              echo "*Generated by GitHub Actions*"
              echo ""
              echo "---"
              echo ""
              echo "Workflow by @TheyCallMeRubik"
              echo "Built with ❤️ and hope for free iran"
            } > "$README_FILE"
          done

          rm -rf tmp_downloads

          # ==================== COMMIT & PUSH ====================
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          mkdir -p downloads
          cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true

          # Update downloads README
          cat > downloads/README.md << 'EOL'
# Downloaded Files List

---
EOL

          for folder in downloads/*/; do
            [ -d "$folder" ] || continue
            FOLDER_NAME=$(basename "$folder")
            FOLDER_ENCODED=$(urlencode "$FOLDER_NAME")
            echo "- [$FOLDER_NAME](./$FOLDER_ENCODED)" >> downloads/README.md
          done

          git add -A downloads/
          git commit -m "[Download] Add files [skip ci]" || echo "No changes to commit"
          git push origin HEAD:"${GITHUB_REF_NAME}" || {
            git fetch origin "${GITHUB_REF_NAME}"
            git reset --hard origin/"${GITHUB_REF_NAME}"
            git push origin HEAD:"${GITHUB_REF_NAME}"
          }

      - name: Final Signature
        if: always()
        run: |
          echo "========================================"
          echo "✅ Workflow Completed"
          echo ""
          echo "Workflow by @TheyCallMeRubik"
          echo "Built with ❤️ and hope for free iran"
          echo ""
          echo "========================================"
